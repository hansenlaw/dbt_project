version: 2

models:

  # ── CUSTOMER MARTS ─────────────────────────────────────────────

  - name: mart_customer_profile
    description: >
      Complete customer directory combining current profile, active loyalty tier, tier change history (SCD2),
      and lifetime transaction statistics. Used by the Marketing and CRM team for campaign targeting,
      loyalty programs, and tier upgrade analysis.
    columns:
      - name: customer_id
        description: "Customer identifier. Permanent — does not change."
        tests:
          - not_null
          - unique

      - name: full_name
        description: "Customer full name."
        tests:
          - not_null

      - name: email
        description: "Current customer email address."
        tests:
          - not_null

      - name: city
        description: "Customer city of residence."
        tests:
          - not_null

      - name: province
        description: "Customer province of residence."
        tests:
          - not_null

      - name: registration_date
        description: "Date the customer first registered."
        tests:
          - not_null

      - name: days_as_customer
        description: "Number of days elapsed since the customer's registration date."
        tests:
          - not_null

      - name: current_tier
        description: "Current customer loyalty tier: Bronze, Silver, or Gold."
        tests:
          - not_null
          - accepted_values:
              values: ['Bronze', 'Silver', 'Gold']
          - no_invalid_tier

      - name: tier_since
        description: "Date the current loyalty tier became effective."
        tests:
          - not_null

      - name: total_tier_upgrades
        description: "Number of times the customer's loyalty tier has been upgraded."
        tests:
          - not_null

      - name: tier_journey
        description: "Chronological tier progression summary (e.g. Bronze → Silver → Gold)."

      - name: lifetime_orders
        description: "Total number of orders placed over the customer's lifetime."
        tests:
          - not_null

      - name: lifetime_spend
        description: "Total spend over the customer's lifetime."
        tests:
          - not_null

  # ── STORE MARTS ────────────────────────────────────────────────

  - name: mart_store_performance
    description: >
      Monthly store KPIs including revenue, order count, unique customers, and inter-store revenue ranking.
      Used by Store Managers to monitor monthly targets, benchmark branches, and detect underperforming stores.
    columns:
      - name: initial_store_code
        description: "Stable store identifier — does not change even when the store code is renamed."
        tests:
          - not_null

      - name: month
        description: "Month period in YYYY-MM format."
        tests:
          - not_null

      - name: total_orders
        description: "Number of orders placed in this month."
        tests:
          - not_null

      - name: unique_customers
        description: "Number of distinct customers who made a purchase in this month."
        tests:
          - not_null

      - name: total_qty_sold
        description: "Total units sold in this month."
        tests:
          - not_null

      - name: total_revenue
        description: "Total sales revenue in this month."
        tests:
          - not_null
          - assert_positive_amount

      - name: avg_order_value
        description: "Average transaction value in this month."
        tests:
          - not_null

      - name: revenue_rank
        description: "Store revenue rank within this month (1 = highest revenue branch)."
        tests:
          - not_null

      - name: cumulative_revenue
        description: "Running total of revenue from the earliest available period through this month."
        tests:
          - not_null

  - name: mart_store_directory
    description: >
      Complete store registry with active/closed status, current store code, code change history,
      and lifetime revenue contribution. Used by Store Managers for portfolio overview and historical tracking.
    columns:
      - name: initial_store_code
        description: "Original store code — serves as the permanent store identity."
        tests:
          - not_null
          - unique

      - name: status
        description: "Current store status: active or closed."
        tests:
          - not_null
          - accepted_values:
              values: ['active', 'closed']
          - no_invalid_store_status

      - name: total_code_changes
        description: "Number of times the store code has changed since initial assignment."
        tests:
          - not_null

      - name: lifetime_revenue
        description: "Total revenue generated over the store's entire operating lifetime."
        tests:
          - not_null

      - name: lifetime_orders
        description: "Total orders processed over the store's entire operating lifetime."
        tests:
          - not_null

  # ── SALES MARTS ────────────────────────────────────────────────

  - name: mart_sales_summary
    description: >
      Daily and monthly sales aggregates including total revenue, orders, quantity, and month-over-month
      growth rate. Used by the Sales team to monitor targets, detect revenue trends, and report period performance.
    columns:
      - name: grain
        description: "Aggregation level: daily or monthly."
        tests:
          - not_null
          - accepted_values:
              values: ['daily', 'monthly']

      - name: period
        description: "Period value — a date string for daily grain, YYYY-MM for monthly grain."
        tests:
          - not_null

      - name: total_orders
        description: "Number of orders within this period."
        tests:
          - not_null

      - name: total_revenue
        description: "Total sales revenue within this period."
        tests:
          - not_null
          - assert_positive_amount

  - name: mart_sales_by_product
    description: >
      Monthly product performance metrics including revenue, quantity sold, revenue rank, and price range.
      Used by the Sales team to identify best-sellers, slow-moving products, and pricing inconsistencies across stores.
    columns:
      - name: product_id
        description: "Product identifier."
        tests:
          - not_null

      - name: month
        description: "Month period in YYYY-MM format."
        tests:
          - not_null

      - name: total_qty_sold
        description: "Total units of this product sold in this month."
        tests:
          - not_null
          - assert_positive_quantity

      - name: total_revenue
        description: "Total revenue generated by this product in this month."
        tests:
          - not_null
          - assert_positive_amount

      - name: revenue_rank
        description: "Product revenue rank within this month (1 = highest revenue product)."
        tests:
          - not_null

      - name: qty_rank
        description: "Product rank by quantity sold within this month (1 = highest volume product)."
        tests:
          - not_null

  - name: mart_sales_by_customer
    description: >
      Customer value profiles and RFM behavioral segmentation. Used by the Sales team for loyalty programs,
      churn-risk customer retention campaigns, and targeted promotional outreach.
    columns:
      - name: customer_id
        description: "Customer identifier."
        tests:
          - not_null
          - unique

      - name: total_orders
        description: "Total number of orders placed over the customer's lifetime."
        tests:
          - not_null

      - name: total_spend
        description: "Total spend over the customer's lifetime."
        tests:
          - not_null
          - assert_positive_amount

      - name: avg_order_value
        description: "Average transaction value across all orders."
        tests:
          - not_null

      - name: days_since_last_purchase
        description: "Days elapsed since the customer's last purchase — a key churn risk indicator."
        tests:
          - not_null

      - name: recency_score
        description: "RFM recency score (1–3). Score 3 = purchased within the last 30 days."
        tests:
          - not_null
          - no_invalid_rfm_score

      - name: frequency_score
        description: "RFM frequency score (1–3). Score 3 = 5 or more distinct orders."
        tests:
          - not_null
          - no_invalid_rfm_score

      - name: monetary_score
        description: "RFM monetary score (1–3). Score 3 = lifetime spend of 300,000 or more."
        tests:
          - not_null
          - no_invalid_rfm_score

      - name: customer_segment
        description: "Behavioral segment derived from RFM total score: Champions, Loyal, Promising, At Risk, or Need Attention."
        tests:
          - not_null
          - accepted_values:
              values: ['Champions', 'Loyal', 'Promising', 'At Risk', 'Need Attention']
