name: dbt CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  dbt-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: demo_io
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt (Postgres adapter)
        run: pip install dbt-postgres

      - name: Create profiles.yml for CI
        run: |
          cat > profiles.yml <<EOF
          io_testing:
            outputs:
              dev:
                type: postgres
                host: localhost
                port: 5432
                dbname: demo_io
                user: postgres
                password: postgres
                schema: public
                threads: 4
            target: dev
          EOF

      - name: Compile dbt models (syntax check)
        run: |
          dbt --version
          dbt compile --profiles-dir .

      - name: Upload dbt artifacts (logs + target)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            logs
            target
