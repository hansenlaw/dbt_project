name: dbt CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  dbt-build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: demo_io
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt (Postgres adapter)
        run: pip install dbt-postgres

      - name: Create profiles.yml for CI
        run: |
          cat > profiles.yml <<EOF
          io_testing:
            outputs:
              dev:
                type: postgres
                host: localhost
                port: 5432
                dbname: demo_io
                user: postgres
                password: postgres
                schema: public
                threads: 4
            target: dev
          EOF

      - name: Compile dbt models (syntax check)
        run: |
          dbt --version
          dbt compile --profiles-dir .

      - name: Upload dbt artifacts (logs + target)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts
          path: |
            logs
            target

      - name: Notify Telegram on failure
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          SERVER_URL: ${{ github.server_url }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -z "$TELEGRAM_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram secrets not configured, skipping."
            exit 0
          fi
          cat > /tmp/notify.py << 'PYEOF'
          import urllib.request, json, os
          t = os.environ
          link = t['SERVER_URL'] + '/' + t['REPO'] + '/actions/runs/' + t['RUN_ID']
          text = (
              '❌ <b>dbt CI GAGAL</b>\n\n'
              '📁 Repo: <code>' + t['REPO'] + '</code>\n'
              '🌿 Branch: <code>' + t['REF_NAME'] + '</code>\n\n'
              '🔗 <a href="' + link + '">Lihat Detail Log</a>'
          )
          data = json.dumps({
              'chat_id': t['TELEGRAM_CHAT_ID'],
              'text': text,
              'parse_mode': 'HTML',
              'disable_web_page_preview': True,
          }).encode()
          req = urllib.request.Request(
              'https://api.telegram.org/bot' + t['TELEGRAM_TOKEN'] + '/sendMessage',
              data=data,
              headers={'Content-Type': 'application/json'},
          )
          try:
              r = urllib.request.urlopen(req)
              print('Telegram sent:', r.status)
          except Exception as e:
              print('Telegram failed (non-blocking):', e)
          PYEOF
          python3 /tmp/notify.py || true
